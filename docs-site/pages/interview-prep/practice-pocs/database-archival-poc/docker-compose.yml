# Docker Compose for Data Archival POC
# Run: docker-compose up -d

version: '3.8'

services:
  # Primary PostgreSQL (Hot Storage)
  postgres-hot:
    image: postgres:15-alpine
    container_name: archival-hot-db
    environment:
      POSTGRES_DB: archival_poc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - postgres-hot-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Archive PostgreSQL (Warm Storage) - Could be TimescaleDB/ClickHouse in production
  postgres-archive:
    image: postgres:15-alpine
    container_name: archival-archive-db
    environment:
      POSTGRES_DB: archival_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./init-scripts-archive:/docker-entrypoint-initdb.d
      - postgres-archive-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible Cold Storage)
  minio:
    image: minio/minio:latest
    container_name: archival-cold-storage
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis (for caching hot data)
  redis:
    image: redis:7-alpine
    container_name: archival-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-hot-data:
  postgres-archive-data:
  minio-data:
  redis-data:
